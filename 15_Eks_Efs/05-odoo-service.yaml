apiVersion: v1
kind: Service
metadata:
  name: odoo-service
  labels:
    app: odoo-web
spec:
  type: LoadBalancer
  selector:
    app: odoo-web # Debe coincidir exactamente con el label del Deployment 04
  ports:
  - name: web
    port: 80         # Puerto por el que entrarás tú (HTTP)
    targetPort: 8069 # Puerto interno de Odoo
    protocol: TCP
  - name: chat
    port: 8072       # Puerto para el chat/longpolling de Odoo
    targetPort: 8072
    protocol: TCP
